name: Generate Podcast

on:
  schedule:
    # 毎日 06:00 JST = 前日 21:00 UTC
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "記事取得の時間範囲（hours, 0=無制限）"
        required: false
        default: "24"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -yqq ffmpeg

      - name: Verify ffmpeg
        run: ffmpeg -version | head -1

      - name: Restore existing feed.xml
        run: |
          # gh-pages 上の既存 feed.xml を取得して audio_files/ に配置
          # → podcast_generator が既存フィードに新エピソードを追記できるようにする
          mkdir -p audio_files
          curl -sSf "${PODCAST_BASE_URL}/feed.xml" -o audio_files/feed.xml 2>/dev/null || {
            echo "既存 feed.xml なし（初回実行）。新規作成します。"
          }
        env:
          PODCAST_BASE_URL: https://necoha.github.io/auto-podcast

      - name: Restore existing feed_deep.xml
        run: |
          # gh-pages 上の既存 feed_deep.xml を取得
          curl -sSf "${PODCAST_BASE_URL}/feed_deep.xml" -o audio_files/feed_deep.xml 2>/dev/null || {
            echo "既存 feed_deep.xml なし（初回実行）。新規作成します。"
          }
        env:
          PODCAST_BASE_URL: https://necoha.github.io/auto-podcast

      - name: Generate podcast
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PODCAST_OWNER_EMAIL: ${{ secrets.PODCAST_OWNER_EMAIL }}
        run: uv run python podcast_generator.py

      - name: Generate deep dive podcast
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PODCAST_OWNER_EMAIL: ${{ secrets.PODCAST_OWNER_EMAIL }}
        run: uv run python deep_podcast_generator.py

      - name: Validate generated feeds
        run: uv run python validate_feeds.py audio_files

      - name: Deploy to gh-pages
        run: |
          # 生成物が存在するか確認（MP3 優先、なければ WAV）
          if ! ls audio_files/*.mp3 1>/dev/null 2>&1 && ! ls audio_files/*.wav 1>/dev/null 2>&1; then
            echo "::warning::音声ファイルが見つかりません。デプロイをスキップします。"
            exit 0
          fi

          # gh-pages ブランチをチェックアウト（存在しなければ orphan 作成）
          git fetch origin gh-pages || true
          git worktree add gh-pages-deploy origin/gh-pages 2>/dev/null || {
            git worktree add --detach gh-pages-deploy
            cd gh-pages-deploy
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            echo "# AI Auto Podcast" > index.html
            git add index.html
            cd ..
          }

          # episodes/ ディレクトリを作成し速報版音声ファイルをコピー（deep_* を除外）
          mkdir -p gh-pages-deploy/episodes
          for f in audio_files/episode_*.mp3; do
            [ -f "$f" ] && cp "$f" gh-pages-deploy/episodes/
          done
          for f in audio_files/episode_*.wav; do
            [ -f "$f" ] && cp "$f" gh-pages-deploy/episodes/
          done

          # Deep Dive 用の episodes_deep/ ディレクトリに深掘り音声をコピー
          mkdir -p gh-pages-deploy/episodes_deep
          cp audio_files/deep_*.mp3 gh-pages-deploy/episodes_deep/ 2>/dev/null || true
          cp audio_files/deep_*.wav gh-pages-deploy/episodes_deep/ 2>/dev/null || true

          # feed.xml をコピー
          if [ -f audio_files/feed.xml ]; then
            cp audio_files/feed.xml gh-pages-deploy/feed.xml
          fi

          # feed_deep.xml をコピー
          if [ -f audio_files/feed_deep.xml ]; then
            cp audio_files/feed_deep.xml gh-pages-deploy/feed_deep.xml
          fi

          # カバー画像をコピー（存在する場合）
          if [ -f cover.jpg ]; then
            cp cover.jpg gh-pages-deploy/cover.jpg
          fi
          if [ -f cover_deep.jpg ]; then
            cp cover_deep.jpg gh-pages-deploy/cover_deep.jpg
          fi

      - name: Cleanup old episodes
        run: |
          if [ -f gh-pages-deploy/feed.xml ] && [ -d gh-pages-deploy/episodes ]; then
            uv run python cleanup_episodes.py gh-pages-deploy/feed.xml gh-pages-deploy/episodes
          else
            echo "feed.xml or episodes/ not found, skipping cleanup"
          fi
          # Deep Dive 版もクリーンアップ
          if [ -f gh-pages-deploy/feed_deep.xml ] && [ -d gh-pages-deploy/episodes_deep ]; then
            uv run python cleanup_episodes.py gh-pages-deploy/feed_deep.xml gh-pages-deploy/episodes_deep
          else
            echo "feed_deep.xml or episodes_deep/ not found, skipping deep cleanup"
          fi

      - name: Commit and push
        run: |
          cd gh-pages-deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && {
            echo "変更なし。デプロイをスキップします。"
            exit 0
          }
          git commit -m "🎙️ Episode $(date +%Y%m%d) deployed"
          git push origin HEAD:gh-pages

      - name: Upload episode artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: episode-${{ github.run_number }}
          path: |
            audio_files/*.mp3
            audio_files/feed.xml
            audio_files/feed_deep.xml
            content/*.json
          retention-days: 90
          if-no-files-found: warn
